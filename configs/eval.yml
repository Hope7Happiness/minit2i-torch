name: local_checkpoint_eval
train_config: configs/finetune.yml
checkpoint: ${T2I_CHECKPOINT_ROOT}/model.pt
checkpoint_target: ema
output_dir: ${T2I_EVAL_OUTPUT_ROOT}/local_checkpoint
python: ${T2I_PYTHON}
geneval_python: ${T2I_GENEVAL_PYTHON}
dpg_python: ${T2I_DPG_PYTHON}
nproc: 1

benchmarks:
  fid:
    enabled: true
    num_samples: 30000
    batch_size: 64
  geneval:
    enabled: true
    generate: true
    evaluate: true
    samples_per_prompt: 4
    batch_size: 4
    metadata: ${T2I_GENEVAL_METADATA}
    model_path: ${T2I_GENEVAL_MODEL_ROOT}
  dpg:
    enabled: true
    generate: true
    evaluate: true
    samples_per_prompt: 4
    batch_size: 4
    data: ${T2I_DPG_BENCH_DATA}
    mplug_ckpt: ${T2I_DPG_MPLUG_CKPT}
    resolution: 512
